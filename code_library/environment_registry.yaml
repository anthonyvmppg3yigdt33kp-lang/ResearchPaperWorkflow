schema_version: "environment_registry.v1"
updated_at: "2026-07-08"
purpose: "Execution environment truth source for method assets. This registry declares environments; it does not install packages during agent execution."

environments:
  r_seurat_v5:
    env_id: r_seurat_v5
    language: R
    manager: renv_or_system
    runner: Rscript
    lock_file: ""
    required_packages:
      - Seurat
      - SeuratObject
      - Matrix
      - ggplot2

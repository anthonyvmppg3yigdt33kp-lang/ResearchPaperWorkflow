id: external.lung_master.de_table_standardizer.v1
name: External DE table standardizer
modality: bulk_rnaseq
step: imported_de_table_standardization
language: python
production_capability_grade: validated_workflow_pilot
execution_evidence_level: toy_real_tested
strategy_visibility: exploratory_candidate
claim_permission: no_claim
current_environment_status: pass
capability_tags: [external-code, de-table, ranked-gene-statistic, post-processing, real-wrapper]
source:
  type: local_wrapper
  path: code_library/modules/external/lung_master/de_table_standardizer/main.py
  origin: lung_master_external_experience_transformation
  license: user_must_review_original_source_terms
environment:
  env_id: python_builtin
  required_packages: []
execution:
  type: python
  script: code_library/modules/external/lung_master/de_table_standardizer/main.py
  timeout_seconds: 300
  args: ["--input", "{differential_expression_table}", "--out", "{node_dir}", "--run-id", "{run_id}"]
default_parameters: {}
input_schema:
  required:
    - {name: differential_expression_table, type: csv}
  optional:
    - {name: dry-run, type: flag}
output_schema:
  artifacts:
    - tables/standardized_de_table.csv
    - tables/ranked_gene_statistic.csv
    - tables/significant_genes.csv
    - qc/input_column_mapping.csv
    - qc/de_table_quality_summary.csv
    - logs/sessionInfo.txt
  source_maps:
    - figure_source_map.yaml
    - table_source_map.yaml
output_bindings:
  ranked_gene_statistic: tables/ranked_gene_statistic.csv
  differential_expression_table: tables/standardized_de_table.csv
reviewer_value:
  - standardizes imported DE columns for downstream enrichment planning
  - records column mapping and claim boundary
  - avoids hard-coded project group labels
reviewer_risk:
  - upstream DE model is not re-executed
  - replicate unit and contrast design are unknown until reviewed
  - FDR provenance must be audited before interpretation
claim_boundary: "Imported DE table post-processing only; upstream differential model, replicate unit, contrast design, and FDR provenance must be reviewed before biological claims."
validation_status: toy_real_tested
method_maturity: real_wrapper_postprocessing
compatible_upstream_modules: []
compatible_downstream_modules:
  - bulk_rnaseq.fgsea_enrichment.v1
figure_outputs: []
table_outputs:
  - standardized_de_table
  - ranked_gene_statistic
  - significant_genes
compute_cost: low
token_cost: low

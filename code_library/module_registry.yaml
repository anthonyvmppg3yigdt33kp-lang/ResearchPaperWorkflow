schema_version: "module_registry.v1"
updated_at: "2026-07-08"
purpose: "Method assets that can be selected by strategy planning, executed by graph runner, audited by source maps, and improved from run feedback."

modules:
  single_cell.seurat_pbmc3k_basic.v1:
    id: single_cell.seurat_pbmc3k_basic.v1
    name: Seurat PBMC3K basic workflow
    modality: single_cell
    modality_aliases: [scrna, single_cell_rna, single-cell]
    step: seurat_basic_workflow
    language: r
    capability_tags: [single-cell, seurat, pbmc3k, qc, pca, umap, clustering, feature-plot]
    biological_question_types:
      - single-cell preprocessing and QC
      - cluster-level exploratory visualization
      - marker gene display
    source:
      type: local_wrapper
      path: code_library/modules/single_cell/seurat_pbmc3k_basic/main.R
      origin: official_seurat_pbmc3k_tutorial_adapted_wrapper
      origin_url: https://satijalab.org/seurat/articles/pbmc3k_tutorial.html
      data_url: https://cf.10xgenomics.com/samples/cell/pbmc3k/pbmc3k_filtered_gene_bc_matrices.tar.gz
      license: user_must_review_upstream_terms_before_redistribution
    environment:
      env_id: r_seurat_v5
      required_packages: [Seurat, Matrix, ggplot2]
    execution:
      type: rscript
      script: code_library/modules/single_cell/seurat_pbmc3k_basic/main.R
      timeout_seconds: 1800
      args:
        - "--input"
        - "{input_dir}"
        - "--out"
        - "{node_dir}"
        - "--run-id"
        - "{run_id}"
        - "--markers"
        - "{markers}"
    default_parameters:
      min_features: 200
      max_features: 2500
      max_mt: 5
      npcs: 10
      resolution: 0.5
      markers: "MS4A1,GNLY,CD3E,CD14,FCER1A,FCGR3A,LYZ,PPBP,CD8A"
    input_schema:
      required:
        - name: input_dir
          type: directory
          description: "10X PBMC3K matrix directory, either filtered_gene_bc_matrices/hg19 or a parent containing it."
      optional:
        - name: markers
          type: comma_separated_gene_symbols
    output_schema:
      artifacts:
        - qc/qc_metrics.csv
        - qc/cell_retention.csv
        - tables/cluster_counts.csv
        - figures/qc_violin.png
        - figures/umap_clusters.png
        - figures/feature_plot_markers.png
        - objects/pbmc3k_seurat_basic.rds
        - logs/sessionInfo.txt
      source_maps:
        - figure_source_map.yaml
        - table_source_map.yaml
    reviewer_value:
      - documents QC thresholds and cell retention
      - produces transparent exploratory UMAP and marker feature plots
      - records Seurat and R session information for Methods
    reviewer_risk:
      - visualization-only evidence cannot support disease inference
      - PBMC3K is a tutorial fixture, not project-specific biological evidence
      - filtering thresholds require project-specific justification before publication
    claim_boundary: "Workflow validation and exploratory single-cell preprocessing only; not a disease mechanism or clinical claim."
    figure_outputs: [qc_violin, umap_clusters, feature_plot_markers]
    table_outputs: [qc_metrics, cell_retention, cluster_counts]
    source_map_requirements: [source_data, script, method, statistical_unit, claim_boundary]
    validation_status: tutorial_fixture_ready
    method_maturity: validated_external_tutorial_wrapper
    compatible_upstream_modules: []
    compatible_downstream_modules:
      - single_cell.marker_annotation.v1
      - single_cell.pseudobulk_de.v1
    compute_cost: low
    token_cost: low

  single_cell.seurat_qc.v1:
    id: single_cell.seurat_qc.v1
    name: Seurat QC filtering module
    modality: single_cell
    modality_aliases: [scrna, single_cell_rna, single-cell]
    step: seurat_qc
    language: r
    capability_tags: [single-cell, seurat, qc, filtering, dry-run]
    biological_question_types: [single-cell preprocessing, QC threshold documentation]
    source:
      type: thin_wrapper
      path: code_library/modules/single_cell/seurat_qc/main.R
      origin: code_library/r/bioinformatics_analysis.R::seurat_qc
      license: MIT
    environment: {env_id: r_seurat_v5, required_packages: [Seurat, SeuratObject, Matrix, ggplot2]}
    execution:
      type: rscript
      script: code_library/modules/single_cell/seurat_qc/main.R
      timeout_seconds: 900
      args: ["--input", "{input_dir}", "--out", "{node_dir}", "--run-id", "{run_id}"]
    default_parameters: {min_features: 200, max_mt: 25}
    input_schema: {required: [{name: input, type: seurat_rds}], optional: [{name: dry-run, type: flag}]}
    output_schema:
      artifacts: [qc/cell_retention.csv, objects/seurat_qc.rds, logs/sessionInfo.txt]
      source_maps: [figure_source_map.yaml, table_source_map.yaml]
    reviewer_value: [documents cell retention, records QC thresholds]
    reviewer_risk: [filter thresholds can bias downstream composition, QC alone is not biological evidence]
    claim_boundary: "QC and filtering only; retained cells are analysis inputs, not biological evidence."
    figure_outputs: [qc_violin]
    table_outputs: [cell_retention]
    source_map_requirements: [source_data, script, method, statistical_unit, claim_boundary]
    validation_status: dry_run_verified
    method_maturity: thin_wrapper
    compatible_upstream_modules: []
    compatible_downstream_modules: [single_cell.seurat_integration_harmony.v1, single_cell.seurat_clustering_umap.v1]
    compute_cost: low
    token_cost: low

  single_cell.seurat_integration_harmony.v1:
    id: single_cell.seurat_integration_harmony.v1
    name: Seurat Harmony integration module
    modality: single_cell
    modality_aliases: [scrna, single_cell_rna, single-cell]
    step: seurat_integration_harmony
    language: r
    capability_tags: [single-cell, seurat, harmony, integration, batch-correction, dry-run]
    biological_question_types: [multi-sample single-cell integration, batch-effect assessment]
    source:
      type: thin_wrapper
      path: code_library/modules/single_cell/seurat_integration_harmony/main.R
      origin: code_library/r/bioinformatics_analysis.R::seurat_harmony
      license: MIT
    environment: {env_id: r_seurat_harmony, required_packages: [Seurat, SeuratObject, harmony, Matrix, ggplot2]}
    execution:
      type: rscript
      script: code_library/modules/single_cell/seurat_integration_harmony/main.R
      timeout_seconds: 1800
      args: ["--input", "{input_dir}", "--out", "{node_dir}", "--run-id", "{run_id}", "--batch-var", "{batch_var}"]
    default_parameters: {batch_var: batch}
    input_schema: {required: [{name: input, type: seurat_rds}, {name: batch-var, type: metadata_column}], optional: [{name: dry-run, type: flag}]}
    output_schema:
      artifacts: [tables/integration_summary.csv, objects/seurat_harmony.rds, logs/sessionInfo.txt]
      source_maps: [figure_source_map.yaml, table_source_map.yaml]
    reviewer_value: [declares batch variable, records integration parameters, separates batch correction from interpretation]
    reviewer_risk: [overcorrection may remove biology, batch correction cannot rescue confounded design]
    claim_boundary: "Batch-corrected embedding for exploratory integration; does not prove batch-free biology."
    figure_outputs: [harmony_embedding]
    table_outputs: [integration_summary]
    source_map_requirements: [source_data, script, method, statistical_unit, claim_boundary]
    validation_status: dry_run_verified
    method_maturity: thin_wrapper
    compatible_upstream_modules: [single_cell.seurat_qc.v1]
    compatible_downstream_modules: [single_cell.seurat_clustering_umap.v1]
    compute_cost: medium
    token_cost: low

  single_cell.seurat_clustering_umap.v1:
    id: single_cell.seurat_clustering_umap.v1
    name: Seurat clustering and UMAP module
    modality: single_cell
    modality_aliases: [scrna, single_cell_rna, single-cell]
    step: seurat_clustering_umap
    language: r
    capability_tags: [single-cell, seurat, clustering, umap, visualization, dry-run]
    biological_question_types: [cluster discovery, exploratory cell-state visualization]
    source:
      type: thin_wrapper
      path: code_library/modules/single_cell/seurat_clustering_umap/main.R
      origin: code_library/r/bioinformatics_analysis.R::seurat_cluster
      license: MIT
    environment: {env_id: r_seurat_v5, required_packages: [Seurat, SeuratObject, Matrix, ggplot2]}
    execution:
      type: rscript
      script: code_library/modules/single_cell/seurat_clustering_umap/main.R
      timeout_seconds: 1200
      args: ["--input", "{input_dir}", "--out", "{node_dir}", "--run-id", "{run_id}", "--resolution", "{resolution}"]
    default_parameters: {resolution: 0.6, npcs: 30}
    input_schema: {required: [{name: input, type: seurat_rds}], optional: [{name: resolution, type: number}, {name: dry-run, type: flag}]}
    output_schema:
      artifacts: [tables/cluster_counts.csv, figures/umap_clusters.png, objects/seurat_clustered.rds, logs/sessionInfo.txt]
      source_maps: [figure_source_map.yaml, table_source_map.yaml]
    reviewer_value: [records clustering resolution, produces auditable UMAP, creates cluster counts]
    reviewer_risk: [clusters are parameter-sensitive, UMAP distances are visual approximations]
    claim_boundary: "Cluster visualization is exploratory and requires annotation/validation before inference."
    figure_outputs: [umap_clusters]
    table_outputs: [cluster_counts]
    source_map_requirements: [source_data, script, method, statistical_unit, claim_boundary]
    validation_status: dry_run_verified
    method_maturity: thin_wrapper
    compatible_upstream_modules: [single_cell.seurat_qc.v1, single_cell.seurat_integration_harmony.v1]
    compatible_downstream_modules: [single_cell.marker_feature_plot.v1, single_cell.pseudobulk_aggregate.v1]
    compute_cost: medium
    token_cost: low

  single_cell.marker_feature_plot.v1:
    id: single_cell.marker_feature_plot.v1
    name: Marker feature plot module
    modality: single_cell
    modality_aliases: [scrna, single_cell_rna, single-cell]
    step: marker_feature_plot
    language: r
    capability_tags: [single-cell, seurat, marker, feature-plot, visualization, dry-run]
    biological_question_types: [marker display, exploratory cell identity support]
    source:
      type: thin_wrapper
      path: code_library/modules/single_cell/marker_feature_plot/main.R
      origin: code_library/r/bioinformatics_analysis.R::plot_feature_nature
      license: MIT
    environment: {env_id: r_seurat_v5, required_packages: [Seurat, SeuratObject, Matrix, ggplot2]}
    execution:
      type: rscript
      script: code_library/modules/single_cell/marker_feature_plot/main.R
      timeout_seconds: 600
      args: ["--input", "{input_dir}", "--out", "{node_dir}", "--run-id", "{run_id}", "--markers", "{markers}"]
    default_parameters: {markers: "MS4A1,CD3E,LYZ"}
    input_schema: {required: [{name: input, type: seurat_rds}, {name: markers, type: comma_separated_gene_symbols}], optional: [{name: dry-run, type: flag}]}
    output_schema:
      artifacts: [tables/marker_presence.csv, figures/marker_feature_plot.png, logs/sessionInfo.txt]
      source_maps: [figure_source_map.yaml, table_source_map.yaml]
    reviewer_value: [documents requested marker list, records absent markers, links feature plots to object source]
    reviewer_risk: [marker display alone does not annotate cells, visual expression is not differential evidence]
    claim_boundary: "Marker display only; expression overlays do not establish cell identity or mechanism alone."
    figure_outputs: [marker_feature_plot]
    table_outputs: [marker_presence]
    source_map_requirements: [source_data, script, method, statistical_unit, claim_boundary]
    validation_status: dry_run_verified
    method_maturity: thin_wrapper
    compatible_upstream_modules: [single_cell.seurat_clustering_umap.v1]
    compatible_downstream_modules: []
    compute_cost: low
    token_cost: low

  single_cell.pseudobulk_aggregate.v1:
    id: single_cell.pseudobulk_aggregate.v1
    name: Single-cell pseudobulk aggregation module
    modality: single_cell
    modality_aliases: [scrna, single_cell_rna, single-cell]
    step: pseudobulk_aggregate
    language: r
    capability_tags: [single-cell, pseudobulk, aggregation, replicate-level, dry-run]
    biological_question_types: [replicate-level aggregation, cell-type-specific DE setup]
    source:
      type: thin_wrapper
      path: code_library/modules/single_cell/pseudobulk_aggregate/main.R
      origin: code_library/r/bioinformatics_analysis.R::pseudobulk_aggregate
      license: MIT
    environment: {env_id: r_seurat_v5, required_packages: [Seurat, SeuratObject, Matrix]}
    execution:
      type: rscript
      script: code_library/modules/single_cell/pseudobulk_aggregate/main.R
      timeout_seconds: 1200
      args: ["--input", "{input_dir}", "--out", "{node_dir}", "--run-id", "{run_id}", "--sample-column", "{sample_column}", "--group-column", "{group_column}"]
    default_parameters: {sample_column: sample_id, group_column: seurat_clusters, min_cells: 10}
    input_schema: {required: [{name: input, type: seurat_rds}, {name: sample-column, type: metadata_column}, {name: group-column, type: metadata_column}], optional: [{name: dry-run, type: flag}]}
    output_schema:
      artifacts: [tables/pseudobulk_metadata.csv, objects/pseudobulk_result.rds, logs/sessionInfo.txt]
      source_maps: [figure_source_map.yaml, table_source_map.yaml]
    reviewer_value: [moves inference to biological replicate level, records sample and group aggregation, prepares DESeq2 input]
    reviewer_risk: [sample mapping errors invalidate inference, low cell counts per group can bias pseudobulk]
    claim_boundary: "Aggregation prepares replicate-level inference; it is not a differential result."
    figure_outputs: []
    table_outputs: [pseudobulk_metadata]
    source_map_requirements: [source_data, script, method, statistical_unit, claim_boundary]
    validation_status: dry_run_verified
    method_maturity: thin_wrapper
    compatible_upstream_modules: [single_cell.seurat_clustering_umap.v1]
    compatible_downstream_modules: [single_cell.pseudobulk_deseq2.v1]
    compute_cost: medium
    token_cost: low

  single_cell.pseudobulk_deseq2.v1:
    id: single_cell.pseudobulk_deseq2.v1
    name: Single-cell pseudobulk DESeq2 module
    modality: single_cell
    modality_aliases: [scrna, single_cell_rna, single-cell]
    step: pseudobulk_deseq2
    language: r
    capability_tags: [single-cell, pseudobulk, deseq2, differential-expression, dry-run]
    biological_question_types: [cell-type-specific differential expression, replicate-level association]
    source:
      type: thin_wrapper
      path: code_library/modules/single_cell/pseudobulk_deseq2/main.R
      origin: code_library/r/bioinformatics_analysis.R::de_deseq2
      license: MIT
    environment: {env_id: r_pseudobulk_deseq2, required_packages: [DESeq2, Matrix, ggplot2]}
    execution:
      type: rscript
      script: code_library/modules/single_cell/pseudobulk_deseq2/main.R
      timeout_seconds: 1800
      args: ["--input", "{input_dir}", "--out", "{node_dir}", "--run-id", "{run_id}", "--condition-column", "{condition_column}", "--reference", "{reference}", "--target", "{target}"]
    default_parameters: {condition_column: condition, reference: control, target: case}
    input_schema: {required: [{name: input, type: pseudobulk_rds}, {name: condition-column, type: metadata_column}, {name: reference, type: group_value}, {name: target, type: group_value}], optional: [{name: dry-run, type: flag}]}
    output_schema:
      artifacts: [tables/pseudobulk_deseq2_results.csv, figures/pseudobulk_deseq2_volcano.png, objects/pseudobulk_deseq2_result.rds, logs/sessionInfo.txt]
      source_maps: [figure_source_map.yaml, table_source_map.yaml]
    reviewer_value: [uses biological replicate pseudobulk, records contrast and FDR, produces DE table]
    reviewer_risk: [requires valid replicate mapping, covariates and batch must be justified, DE result is association not mechanism]
    claim_boundary: "Pseudobulk DE requires valid replicate/sample mapping and covariate review before publication claims."
    figure_outputs: [pseudobulk_deseq2_volcano]
    table_outputs: [pseudobulk_deseq2_results]
    source_map_requirements: [source_data, script, method, statistical_unit, claim_boundary]
    validation_status: dry_run_verified
    method_maturity: thin_wrapper
    compatible_upstream_modules: [single_cell.pseudobulk_aggregate.v1]
    compatible_downstream_modules: []
    compute_cost: medium
    token_cost: low

  bulk_rnaseq.python_builtin_pilot.v1:
    id: bulk_rnaseq.python_builtin_pilot.v1
    name: Built-in bulk RNA-seq pilot adapter
    modality: bulk_rnaseq
    step: differential_expression_pilot
    language: python
    capability_tags: [bulk-rnaseq, pilot, qc, volcano, heatmap]
    source:
      type: internal_adapter
      path: src/paper_workflow/analysis/adapters.py
      origin: workflow_builtin
      license: MIT
    environment:
      env_id: python_builtin
      required_packages: []
    input_schema:
      required:
        - count_matrix_csv
        - sample_metadata_csv
    output_schema:
      artifacts:
        - tables/differential_expression_pilot.csv
        - qc/sample_qc.csv
        - figures/volcano_plot.svg
        - figures/deg_heatmap.svg
    reviewer_value:
      - proves scoped execution and source-map writing
    reviewer_risk:
      - approximate statistics are not publication-grade DE
    claim_boundary: "Workflow execution pilot only; use DESeq2/edgeR/limma for publication-grade inference."
    figure_outputs: [volcano_plot, deg_heatmap]
    table_outputs: [differential_expression_pilot, sample_qc]
    validation_status: tested_internal
    method_maturity: pilot
    compute_cost: low
    token_cost: low

  bulk_rnaseq.deseq2_de.v1:
    id: bulk_rnaseq.deseq2_de.v1
    name: Publication-oriented DESeq2 differential expression
    modality: bulk_rnaseq
    modality_aliases: [bulk, rnaseq, rna_seq]
    step: deseq2_de
    language: r
    capability_tags: [bulk-rnaseq, deseq2, differential-expression, publication-oriented, dry-run]
    biological_question_types: [bulk RNA-seq group contrast, replicate-level association testing]
    source: {type: thin_wrapper, path: code_library/modules/bulk_rnaseq/deseq2_de/main.R, origin: DESeq2_publication_oriented_contract, license: MIT}
    environment: {env_id: r_bulk_rnaseq, required_packages: [DESeq2, edgeR, limma, ggplot2, pheatmap]}
    execution:
      type: rscript
      script: code_library/modules/bulk_rnaseq/deseq2_de/main.R
      timeout_seconds: 1800
      args: ["--counts", "{count_matrix}", "--metadata", "{metadata}", "--out", "{node_dir}", "--run-id", "{run_id}", "--condition-column", "{condition_column}", "--reference", "{reference}", "--target", "{target}"]
    default_parameters: {condition_column: condition, reference: control, target: case}
    input_schema: {required: [count_matrix_csv, sample_metadata_csv, condition_column], optional: [covariates, dry-run]}
    output_schema:
      artifacts: [tables/normalized_counts_summary.csv, tables/deseq2_de_results.csv, figures/deseq2_volcano.png, figures/deseq2_heatmap.png, logs/sessionInfo.txt]
      source_maps: [figure_source_map.yaml, table_source_map.yaml]
    reviewer_value: [normalized counts summary, DE table, volcano, heatmap, contrast and FDR record]
    reviewer_risk: [design matrix must match biological replicates, low sample size limits inference, association is not mechanism]
    claim_boundary: "Publication-oriented association testing only; causal or mechanism claims require validation."
    figure_outputs: [deseq2_volcano, deseq2_heatmap]
    table_outputs: [normalized_counts_summary, deseq2_de_results]
    validation_status: publication_oriented_dry_run_verified
    method_maturity: validated_publication_oriented_wrapper
    compatible_upstream_modules: []
    compatible_downstream_modules: [bulk_rnaseq.fgsea_enrichment.v1]
    compute_cost: medium
    token_cost: low

  bulk_rnaseq.limma_voom_de.v1:
    id: bulk_rnaseq.limma_voom_de.v1
    name: Publication-oriented limma-voom differential expression
    modality: bulk_rnaseq
    modality_aliases: [bulk, rnaseq, rna_seq]
    step: limma_voom_de
    language: r
    capability_tags: [bulk-rnaseq, limma, voom, differential-expression, publication-oriented, dry-run]
    biological_question_types: [bulk RNA-seq group contrast, paired or blocked design]
    source: {type: thin_wrapper, path: code_library/modules/bulk_rnaseq/limma_voom_de/main.R, origin: limma_voom_publication_oriented_contract, license: MIT}
    environment: {env_id: r_bulk_rnaseq, required_packages: [limma, edgeR, ggplot2, pheatmap]}
    execution:
      type: rscript
      script: code_library/modules/bulk_rnaseq/limma_voom_de/main.R
      timeout_seconds: 1800
      args: ["--counts", "{count_matrix}", "--metadata", "{metadata}", "--out", "{node_dir}", "--run-id", "{run_id}", "--condition-column", "{condition_column}", "--reference", "{reference}", "--target", "{target}"]
    default_parameters: {condition_column: condition, reference: control, target: case}
    input_schema: {required: [count_matrix_csv, sample_metadata_csv, condition_column], optional: [block_column, covariates, dry-run]}
    output_schema:
      artifacts: [tables/voom_normalization_summary.csv, tables/limma_voom_de_results.csv, figures/limma_voom_heatmap.png, logs/sessionInfo.txt]
      source_maps: [figure_source_map.yaml, table_source_map.yaml]
    reviewer_value: [voom normalization summary, moderated inference, design matrix transparency]
    reviewer_risk: [paired/block design must be correct, empirical Bayes cannot fix confounding]
    claim_boundary: "Publication-oriented association testing; design matrix and covariates must be reviewed."
    figure_outputs: [limma_voom_heatmap]
    table_outputs: [voom_normalization_summary, limma_voom_de_results]
    validation_status: publication_oriented_dry_run_verified
    method_maturity: validated_publication_oriented_wrapper
    compatible_upstream_modules: []
    compatible_downstream_modules: [bulk_rnaseq.fgsea_enrichment.v1]
    compute_cost: medium
    token_cost: low

  bulk_rnaseq.wgcna.v1:
    id: bulk_rnaseq.wgcna.v1
    name: Publication-oriented WGCNA module-trait workflow
    modality: bulk_rnaseq
    modality_aliases: [bulk, rnaseq, rna_seq]
    step: wgcna
    language: r
    capability_tags: [bulk-rnaseq, wgcna, co-expression, module-trait, publication-oriented, dry-run]
    biological_question_types: [co-expression module discovery, module-trait association]
    source: {type: thin_wrapper, path: code_library/modules/bulk_rnaseq/wgcna/main.R, origin: code_library/r/bioinformatics_analysis.R::run_wgcna, license: MIT}
    environment: {env_id: r_bulk_rnaseq, required_packages: [WGCNA, ggplot2, pheatmap]}
    execution:
      type: rscript
      script: code_library/modules/bulk_rnaseq/wgcna/main.R
      timeout_seconds: 3600
      args: ["--expression", "{expression_matrix}", "--traits", "{traits}", "--out", "{node_dir}", "--run-id", "{run_id}"]
    default_parameters: {soft_power: auto, min_module_size: 30, merge_cut_height: 0.25}
    input_schema: {required: [normalized_expression_matrix, sample_trait_table], optional: [soft_power, dry-run]}
    output_schema:
      artifacts: [tables/wgcna_parameters.csv, tables/wgcna_module_trait_correlation.csv, figures/wgcna_sample_clustering.png, logs/sessionInfo.txt]
      source_maps: [figure_source_map.yaml, table_source_map.yaml]
    reviewer_value: [soft power, module count, module-trait correlation, sample clustering, outlier handling]
    reviewer_risk: [module-trait associations are observational, sample outliers and batch effects can dominate modules]
    claim_boundary: "Co-expression module association only; hub genes and modules do not prove mechanism."
    figure_outputs: [wgcna_sample_clustering]
    table_outputs: [wgcna_parameters, wgcna_module_trait_correlation]
    validation_status: publication_oriented_dry_run_verified
    method_maturity: validated_publication_oriented_wrapper
    compatible_upstream_modules: []
    compatible_downstream_modules: [bulk_rnaseq.fgsea_enrichment.v1]
    compute_cost: high
    token_cost: medium

  bulk_rnaseq.fgsea_enrichment.v1:
    id: bulk_rnaseq.fgsea_enrichment.v1
    name: Publication-oriented fgsea enrichment
    modality: bulk_rnaseq
    modality_aliases: [bulk, rnaseq, rna_seq, enrichment]
    step: fgsea_enrichment
    language: r
    capability_tags: [bulk-rnaseq, fgsea, enrichment, pathway, publication-oriented, dry-run]

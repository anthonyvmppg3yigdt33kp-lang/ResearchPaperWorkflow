    file_path: code_library/patterns/clustering/leiden_clustering.py
    parameters:
      - {name: resolution, type: float, default: 0.6, description: "Leiden resolution parameter"}
      - {name: n_neighbors, type: int, default: 15, description: "Number of neighbors for graph"}

  multi_resolution:

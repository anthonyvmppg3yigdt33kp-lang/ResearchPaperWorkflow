plugins:
  mt_filter:
    name: mt_filter
    version: "1.0.0"
    language: python
    category: qc
    entry_point: code_library.patterns.qc.mt_filter
    description: "QC module: mitochondrial read percentage filtering for single-cell data"
    file_path: code_library/patterns/qc/mt_filter.py
    inputs:
      - {name: adata, type: AnnData, description: "Input AnnData object", required: true}
    outputs:
      - {name: adata_filtered, type: AnnData, description: "Filtered AnnData object"}
    parameters:
      - {name: mt_threshold, type: float, default: 25.0, description: "Max MT% threshold"}
      - {name: min_genes, type: int, default: 200, description: "Minimum genes per cell"}
      - {name: min_cells, type: int, default: 3, description: "Minimum cells per gene"}


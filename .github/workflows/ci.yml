name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - "codex/**"

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile sources
        run: python -m compileall -q src scripts tests

      - name: Run tests
        run: python -m pytest -q

  method-asset-schema:
    name: Method Asset Schema
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate configs and repository guardrails
        run: python scripts/ci_quality_check.py

      - name: Audit v5 module production grades
        run: python scripts/ci_module_grade_audit.py --strict

      - name: Exercise fail-closed supervision cases
        run: python scripts/ci_supervision_failure_cases.py

      - name: Validate workflow contract
        run: python -m paper_workflow.cli.main validate-contract --strict

      - name: Audit method assets
        run: python -m paper_workflow.cli.main audit-method-assets --strict --json

      - name: Validate method assets
        run: python -m pytest -q tests/test_method_assets.py tests/test_source_map_contracts.py

  cli-smoke-bulk:
    name: CLI Smoke Bulk
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run bulk pilot CLI smoke
        run: python scripts/ci_cli_smoke.py --output-root .ci_artifacts/bulk_smoke --json

      - name: Upload bulk smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bulk-smoke-run
          path: |
            .ci_artifacts/bulk_smoke/papers/test_paper/results/runs/bulk_de_20260707_v1/run_manifest.yaml
            .ci_artifacts/bulk_smoke/papers/test_paper/results/runs/bulk_de_20260707_v1/analysis_design.yaml
            .ci_artifacts/bulk_smoke/papers/test_paper/results/runs/bulk_de_20260707_v1/evaluation_report.yaml
            .ci_artifacts/bulk_smoke/papers/test_paper/results/runs/bulk_de_20260707_v1/figure_source_map.yaml
            .ci_artifacts/bulk_smoke/papers/test_paper/results/runs/bulk_de_20260707_v1/table_source_map.yaml

  cli-smoke-graph-dry-run:
    name: CLI Smoke Graph Dry Run
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run method-asset graph dry-run
        run: python scripts/ci_graph_dry_run.py --output-root .ci_artifacts/graph_dry_run --json

      - name: Upload graph dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: graph-dry-run
          path: |
            .ci_artifacts/graph_dry_run/papers/test_paper/results/runs/pbmc3k_demo_20260708_v1/run_manifest.yaml
            .ci_artifacts/graph_dry_run/papers/test_paper/results/runs/pbmc3k_demo_20260708_v1/analysis_graph.yaml
            .ci_artifacts/graph_dry_run/papers/test_paper/results/runs/pbmc3k_demo_20260708_v1/method_selection_report.md
            .ci_artifacts/graph_dry_run/papers/test_paper/results/runs/pbmc3k_demo_20260708_v1/evaluation_report.yaml
            .ci_artifacts/graph_dry_run/papers/test_paper/results/runs/pbmc3k_demo_20260708_v1/figure_source_map.yaml
            .ci_artifacts/graph_dry_run/papers/test_paper/results/runs/pbmc3k_demo_20260708_v1/table_source_map.yaml

  target-task-pbmc3k:
    name: TargetTask PBMC3K
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run PBMC3K TargetTask smoke
        run: python scripts/ci_pbmc3k_target_task.py --output-root .ci_artifacts/pbmc3k_target --json

      - name: Check v5 performance budget
        run: python scripts/ci_performance_budget.py --json

      - name: Upload TargetTask artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pbmc3k-target-task
          path: |
            .ci_artifacts/pbmc3k_target/papers/pbmc3k_t_subcluster/results/runs/pbmc3k_t_subcluster_20260709_v1/run_manifest.yaml
            .ci_artifacts/pbmc3k_target/papers/pbmc3k_t_subcluster/results/runs/pbmc3k_t_subcluster_20260709_v1/analysis_graph.yaml
            .ci_artifacts/pbmc3k_target/papers/pbmc3k_t_subcluster/results/runs/pbmc3k_t_subcluster_20260709_v1/evaluation_report.yaml
            .ci_artifacts/pbmc3k_target/papers/pbmc3k_t_subcluster/results/runs/pbmc3k_t_subcluster_20260709_v1/qc/fail_closed_decision.yaml
            .ci_artifacts/pbmc3k_target/papers/pbmc3k_t_subcluster/results/runs/pbmc3k_t_subcluster_20260709_v1/manuscript/results_skeleton.md

  researcher-experience:
    name: Researcher Experience
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile research intent into TargetTask and dashboard
        run: python scripts/ci_research_experience.py --output-root .ci_artifacts/research_experience --json

      - name: Upload researcher-facing planning artifacts
        uses: actions/upload-artifact@v4
        with:
          name: research-experience
          path: |
            .ci_artifacts/research_experience/papers/pbmc3k_t_subcluster/research_plan/scientific_assessment.yaml
            .ci_artifacts/research_experience/papers/pbmc3k_t_subcluster/research_plan/strategy_simulation.yaml
            .ci_artifacts/research_experience/papers/pbmc3k_t_subcluster/research_plan/FIGURE_PLAN.md
            .ci_artifacts/research_experience/papers/pbmc3k_t_subcluster/research_plan/RESEARCH_DASHBOARD.md
            .ci_artifacts/research_experience/papers/pbmc3k_t_subcluster/research_plan/target_task.yaml

  r-method-contract:
    name: R Method Contract
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install R
        run: |
          sudo apt-get update
          sudo apt-get install -y r-base

      - name: Parse and dry-run R method wrappers
        run: Rscript scripts/ci_r_method_contract.R

      - name: Dry-run Seurat subcluster wrapper without Seurat data
        run: Rscript scripts/ci_seurat_subcluster_smoke.R

  security-light:
    name: Security Light
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for oversized tracked artifacts
        run: python scripts/ci_quality_check.py --max-bytes 25000000

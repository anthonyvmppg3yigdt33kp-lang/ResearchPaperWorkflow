schema_version: "analysis_graph_schema.v1"
purpose: "AnalysisGraph contract for multi-omics method-asset orchestration."

required_top_level_fields:
  - schema_version
  - run_id
  - research_question
  - primary_objective
  - statistical_unit
  - data_bindings
  - analysis_graph
  - execution_policy

node_required_fields:
  - node_id
  - module_id
  - inputs
  - parameters
  - outputs

execution_policy:
  require_user_approval: true
  require_data_registry: true
  require_env_lock: true
  raw_data_mutation: forbidden
  write_scope: results/runs/<run_id>/

node_outputs:
  required:
    - node_manifest.yaml
    - parameters.yaml
    - stdout/stderr logs when executed
  source_maps:
    figure: figure_source_map.yaml
    table: table_source_map.yaml

schema_version: "module_registry_schema.v1"
purpose: "Required fields for code_library method assets."

module_required_fields:
  - id
  - name
  - modality
  - step
  - language
  - source
  - environment
  - input_schema
  - output_schema
  - reviewer_value
  - reviewer_risk
  - claim_boundary
  - validation_status
  - method_maturity
  - production_capability_grade
  - execution_evidence_level
  - strategy_visibility
  - claim_permission
  - current_environment_status

source_required_fields:
  - type
  - path
  - origin

execution_required_when_executable:
  - type
  - script
  - args
  - timeout_seconds

quality_requirements:
  production_grades:
    allowed:
      - production_capable_real_wrapper
      - validated_workflow_pilot
      - dry_run_contract
      - adapter_contract
      - scaffold_only
      - planning_contract
      - blocked_environment
      - retired
    forbidden_as_primary:
      - adapter_contract
      - scaffold_only
      - planning_contract
      - blocked_environment
      - retired
  strategy_visibility:
    allowed:
      - production_candidate
      - exploratory_candidate
      - planning_only
      - hidden_from_production
  claim_permission:
    allowed:
      - workflow_test_only
      - exploratory_only
      - association_with_review
      - no_claim
  source_maps:
    - figure_source_map.yaml
    - table_source_map.yaml
  manifests:
    - node_manifest.yaml
    - parameters.yaml
    - outputs_manifest.yaml
  provenance:
    - origin_url_or_internal_origin
    - claim_boundary
    - reviewer_risk

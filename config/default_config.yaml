# =============================================================================
# Research Paper Workflow v2 — Default Configuration
# =============================================================================
# This file defines the complete pipeline, quality gates, writing standards,
# research domains, skills dispatching, agent routing, supervision, code library,
# output interfaces, reproducibility, and extension points for the 18-stage
# academic paper writing workflow.
# =============================================================================

# =============================================================================
# 1. PIPELINE STAGES (18 stages)
# =============================================================================
pipeline:
  version: "3.0.0"
  description: "End-to-end academic research paper writing pipeline — 19 stages with 41 medical evidence quality gates (v3.0)"
  stages:
    # --- STAGE 1: select_topic ---
    - id: select_topic
      name: "Select Research Topic"
      layer: strategy
      order: 1
      agent: research_strategist
      skills:
        - topic_research
        - deep-research
      timeout_seconds: 1800
      dependencies: []
      artifacts_out:
        - "topic_proposal.md"
        - "feasibility_assessment.md"
      human_checkpoint: true
      retry:
        max_attempts: 2
      gate_rules:
        on_pass:
          - "advance_to: target_journal"
        on_fail:
          - "abort_pipeline"
          - "notify_human: topic_not_feasible"

    # --- STAGE 2: target_journal ---
    - id: target_journal
      name: "Select Target Journal"
      layer: strategy
      order: 2
      agent: research_strategist
      skills:
        - deep-research
        - nature-academic-search
      timeout_seconds: 1200
      dependencies:
        - select_topic
      artifacts_out:
        - "journal_selection_report.md"
        - "journal_requirements.yaml"
      human_checkpoint: true
      retry:
        max_attempts: 2
      gate_rules:
        on_pass:
          - "advance_to: literature_search"
        on_fail:
          - "retry_stage"
          - "notify_human: no_suitable_journal"

    # --- STAGE 3: literature_search ---
    - id: literature_search
      name: "Literature Search & Review"
      layer: strategy
      order: 3
      agent: literature_reviewer
      skills:
        - deep-research
        - nature-academic-search
        - nature-citation
      timeout_seconds: 3600
      dependencies:
        - select_topic
      artifacts_out:
        - "literature_review.md"
        - "references.bib"
        - "citation_map.yaml"
      human_checkpoint: false
      retry:
        max_attempts: 3
      gate_rules:
        on_pass:
          - "advance_to: formulate_hypotheses"
        on_fail:
          - "retry_stage"
          - "notify_human: literature_gaps"

    # --- STAGE 4: formulate_hypotheses ---
    - id: formulate_hypotheses
      name: "Formulate Research Hypotheses"
      layer: strategy
      order: 4
      agent: research_strategist
      skills:
        - scientific-writing
        - topic_research
      timeout_seconds: 900
      dependencies:
        - select_topic
        - literature_search
        - target_journal
      artifacts_out:
        - "hypotheses_document.md"
        - "research_questions.yaml"
        - "hypotheses.yaml"
      human_checkpoint: true
      retry:
        max_attempts: 2
      gate_rules:
        on_pass:
          - "advance_to: design_analysis_plan"
        on_fail:
          - "retry_stage"
          - "notify_human: hypotheses_not_testable"

    # --- STAGE 4.5: design_analysis_plan (v3.0 NEW) ---
    - id: design_analysis_plan
      name: "Design Statistical Analysis Plan"
      layer: strategy
      order: 5
      agent: statistician
      skills:
        - statistical_testing
        - scientific-writing
      timeout_seconds: 1800
      dependencies:
        - formulate_hypotheses
      artifacts_out:
        - "statistical_analysis_plan.yaml"
        - "study_design_protocol.yaml"
        - "causal_assumption_audit.md"
      human_checkpoint: true
      retry:
        max_attempts: 2
      gate_rules:
        on_pass:
          - "advance_to: data_audit"
        on_fail:
          - "retry_stage"
          - "notify_human: analysis_plan_incomplete"
      description: >
        v3.0 NEW — Statistician involved BEFORE data audit and figure planning.
        Generates pre-specified Statistical Analysis Plan (SAP) defining primary/
        secondary endpoints, sample unit, covariates, multiple testing strategy,
        missing data handling, sensitivity analyses, negative controls, and
        external validation plan. The SAP is FROZEN before primary analysis.
        Also invokes clinical_methodologist for study design protocol and
        causal_inference_reviewer for DAG/confounding assessment.

    # --- STAGE 6: data_audit ---
    - id: data_audit
      name: "Data Audit & Validation"
      layer: execution
      order: 6
      agent: data_auditor
      skills:
        - nature-data
        - qc_pipeline
      timeout_seconds: 2400
      dependencies:
        - design_analysis_plan
      artifacts_out:
        - "data_audit_report.md"
        - "data_availability_statement.md"
        - "data_inventory.yaml"
      human_checkpoint: false
      retry:
        max_attempts: 2
      gate_rules:
        on_pass:
          - "advance_to: figure_planning"
        on_fail:
          - "retry_stage"
          - "notify_human: data_quality_issues"

    # --- STAGE 7: figure_planning ---
    - id: figure_planning
      name: "Figure Planning & Design"
      layer: execution
      order: 7
      agent: figure_planner
      skills:
        - figure_planning
        - nature-figure
      timeout_seconds: 1800
      dependencies:
        - design_analysis_plan
        - data_audit
      artifacts_out:
        - "figure_plan.md"
        - "figure_specifications.yaml"
      human_checkpoint: true
      retry:
        max_attempts: 2
      gate_rules:
        on_pass:
          - "advance_to: run_analysis"
        on_fail:
          - "retry_stage"
          - "notify_human: figure_plan_incomplete"

    # --- STAGE 8: run_analysis ---
    - id: run_analysis
      name: "Run Computational Analysis"
      layer: execution
      order: 8
      agent: analysis_executor
      skills:
        - spatial_analysis
        - statistical_testing
        - pathway_inference
        - qc_pipeline
      timeout_seconds: 7200
      dependencies:
        - figure_planning
        - data_audit
      artifacts_out:
        - "analysis_results.yaml"
        - "statistical_outputs/"
        - "figures/"
      human_checkpoint: false
      retry:
        max_attempts: 3
      gate_rules:
        on_pass:
          - "advance_to: verify_methods"
        on_fail:
          - "retry_stage"
          - "notify_human: analysis_failed"

    # --- STAGE 9: verify_methods ---
    - id: verify_methods
      name: "Verify Methods & Reproducibility"
      layer: execution
      order: 9
      agent: pipeline_engineer
      skills:
        - qc_pipeline
        - statistical_testing
      timeout_seconds: 1200
      dependencies:
        - run_analysis
      artifacts_out:
        - "methods_verification_report.md"
      human_checkpoint: false
      retry:
        max_attempts: 2
      gate_rules:
        on_pass:
          - "advance_to: write_methods"
        on_fail:
          - "retry_stage"
          - "notify_human: reproducibility_failure"

    # --- STAGE 10: write_methods ---
    - id: write_methods
      name: "Write Methods Section"
      layer: decision
      order: 10
      agent: report_writer
      skills:
        - scientific-writing
        - nature-writing
      timeout_seconds: 2400
      dependencies:
        - verify_methods
      artifacts_out:
        - "methods_section.md"
      human_checkpoint: true
      retry:
        max_attempts: 3
      gate_rules:
        on_pass:
          - "advance_to: write_results"
        on_fail:
          - "retry_stage"
          - "notify_human: methods_incomplete"

    # --- STAGE 11: write_results ---
    - id: write_results
      name: "Write Results Section"
      layer: decision
      order: 11
      agent: report_writer
      skills:
        - scientific-writing
        - nature-writing
        - nature-polishing
      timeout_seconds: 3600
      dependencies:
        - verify_methods
        - figure_planning
      artifacts_out:
        - "results_section.md"
      human_checkpoint: true
      retry:
        max_attempts: 3
      gate_rules:
        on_pass:
          - "advance_to: write_introduction"
        on_fail:
          - "retry_stage"
          - "notify_human: results_incomplete"

    # --- STAGE 12: write_introduction ---
    - id: write_introduction
      name: "Write Introduction Section"
      layer: decision
      order: 12
      agent: report_writer
      skills:
        - scientific-writing
        - nature-writing
        - nature-academic-search
      timeout_seconds: 2400
      dependencies:
        - literature_search
        - formulate_hypotheses
      artifacts_out:
        - "introduction_section.md"
      human_checkpoint: true
      retry:
        max_attempts: 3
      gate_rules:
        on_pass:
          - "advance_to: write_discussion"
        on_fail:
          - "retry_stage"
          - "notify_human: introduction_incomplete"

    # --- STAGE 13: write_discussion ---
    - id: write_discussion
      name: "Write Discussion Section"
      layer: decision
      order: 13
      agent: report_writer
      skills:
        - scientific-writing
        - nature-writing
        - nature-polishing
      timeout_seconds: 3000
      dependencies:
        - write_results
        - literature_search
      artifacts_out:
        - "discussion_section.md"
      human_checkpoint: true
      retry:
        max_attempts: 3
      gate_rules:
        on_pass:
          - "advance_to: assemble_manuscript"
        on_fail:
          - "retry_stage"
          - "notify_human: discussion_incomplete"

    # --- STAGE 14: assemble_manuscript ---
    - id: assemble_manuscript
      name: "Assemble Full Manuscript"
      layer: decision
      order: 14
      agent: report_writer
      skills:
        - scientific-writing
        - nature-writing
        - nature-polishing
        - nature-citation
        - nature-figure
        - nature-data
      timeout_seconds: 3600
      dependencies:
        - write_introduction
        - write_methods
        - write_results
        - write_discussion
      artifacts_out:
        - "manuscript_draft.md"
        - "manuscript_draft.pdf"
      human_checkpoint: true
      retry:
        max_attempts: 2
      gate_rules:
        on_pass:
          - "advance_to: integrity_check"
        on_fail:
          - "retry_stage"
          - "notify_human: assembly_failed"

    # --- STAGE 15: integrity_check ---
    - id: integrity_check
      name: "Integrity & Quality Check"
      layer: decision
      order: 15
      agent: integrity_checker
      skills:
        - qc_pipeline
        - nature-data
        - nature-citation
      timeout_seconds: 2400
      dependencies:
        - assemble_manuscript
      artifacts_out:
        - "integrity_report.yaml"
        - "quality_gate_results.yaml"
      human_checkpoint: false
      retry:
        max_attempts: 2
      gate_rules:
        on_pass:
          - "advance_to: internal_review"
        on_fail:
          - "retry_stage"
          - "notify_human: integrity_check_failed"

    # --- STAGE 16: internal_review ---
    - id: internal_review
      name: "Internal Peer Review"
      layer: decision
      order: 16
      agent: team_orchestrator
      skills:
        - academic-paper-reviewer
        - humanizer
      timeout_seconds: 3600
      dependencies:
        - integrity_check
      artifacts_out:
        - "internal_review_report.md"
        - "revision_roadmap.yaml"
      human_checkpoint: true
      retry:
        max_attempts: 2
      gate_rules:
        on_pass:
          - "advance_to: apply_revision"
        on_fail:
          - "retry_stage"
          - "notify_human: review_rejected"

    # --- STAGE 17: apply_revision ---
    - id: apply_revision
      name: "Apply Revisions"
      layer: decision
      order: 17
      agent: report_writer
      skills:
        - scientific-writing
        - nature-writing
        - nature-polishing
        - humanizer
        - nature-response
      timeout_seconds: 3600
      dependencies:
        - internal_review
      artifacts_out:
        - "revised_manuscript.md"
        - "revision_tracker.yaml"
      human_checkpoint: true
      retry:
        max_attempts: 3
      gate_rules:
        on_pass:
          - "advance_to: re_review"
        on_fail:
          - "retry_stage"
          - "notify_human: revision_incomplete"

    # --- STAGE 18: re_review ---
    - id: re_review
      name: "Re-Review Revised Manuscript"
      layer: decision
      order: 18
      agent: team_orchestrator
      skills:
        - academic-paper-reviewer
        - nature-citation
      timeout_seconds: 2400
      dependencies:
        - apply_revision
      artifacts_out:
        - "re_review_report.md"
        - "final_quality_gates.yaml"
      human_checkpoint: true
      retry:
        max_attempts: 2
      gate_rules:
        on_pass:
          - "advance_to: finalize"
        on_fail:
          - "retry_stage"
          - "notify_human: re_review_failed"

    # --- STAGE 19: finalize ---
    - id: finalize
      name: "Finalize & Package Manuscript"
      layer: supervision
      order: 19
      agent: integrity_checker
      skills:
        - nature-polishing
        - nature-data
        - nature-citation
        - nature-figure
      timeout_seconds: 1800
      dependencies:
        - re_review
      artifacts_out:
        - "final_manuscript.md"
        - "final_manuscript.pdf"
        - "submission_package.yaml"
        - "reproducibility_bundle.zip"
      human_checkpoint: true
      retry:
        max_attempts: 1
      gate_rules:
        on_pass:
          - "pipeline_complete"
        on_fail:
          - "notify_human: finalization_failed"

# =============================================================================
# 2. PAPER TYPES
# =============================================================================
paper_types:
  original_research:
    name: "Original Research Article"
    pipeline_mode: full
    required_stages:
      - select_topic
      - target_journal
      - literature_search
      - formulate_hypotheses
      - data_audit
      - figure_planning
      - run_analysis
      - verify_methods
      - write_methods
      - write_results
      - write_introduction
      - write_discussion
      - assemble_manuscript
      - integrity_check
      - internal_review
      - apply_revision
      - re_review
      - finalize
    skipped_stages: []
    structure:
      sections:
        - title_page
        - abstract
        - introduction
        - methods
        - results
        - discussion
        - acknowledgments
        - references
        - figures_tables
        - supplementary
      abstract_word_limit: 300
      total_word_limit: 6000
      figure_limit: 8
      table_limit: 4

  methods:
    name: "Methods Paper"
    pipeline_mode: methods_only
    required_stages:
      - select_topic
      - target_journal
      - literature_search
      - data_audit
      - run_analysis
      - verify_methods
      - write_methods
      - assemble_manuscript
      - integrity_check
      - internal_review
      - apply_revision
      - re_review
      - finalize
    skipped_stages:
      - formulate_hypotheses
      - figure_planning
      - write_results
      - write_introduction
      - write_discussion
    structure:
      sections:
        - title_page
        - abstract
        - introduction
        - methods
        - validation
        - discussion
        - data_availability
        - code_availability
        - references
        - supplementary
      abstract_word_limit: 250
      total_word_limit: 4500
      figure_limit: 6
      table_limit: 3

  review:
    name: "Literature Review"
    pipeline_mode: review
    required_stages:
      - select_topic
      - target_journal
      - literature_search
      - formulate_hypotheses
      - write_introduction
      - write_discussion
      - assemble_manuscript
      - integrity_check
      - internal_review
      - apply_revision
      - re_review
      - finalize
    skipped_stages:
      - data_audit
      - figure_planning
      - run_analysis
      - verify_methods
      - write_methods
      - write_results
    structure:
      sections:
        - title_page
        - abstract
        - introduction
        - thematic_sections
        - discussion
        - conclusions
        - references
        - supplementary
      abstract_word_limit: 250
      total_word_limit: 10000
      figure_limit: 4
      table_limit: 6

  clinical_research:
    name: "Clinical Research Article"
    pipeline_mode: full
    required_stages:
      - select_topic
      - target_journal
      - literature_search
      - formulate_hypotheses
      - data_audit
      - figure_planning
      - run_analysis
      - verify_methods
      - write_methods
      - write_results
      - write_introduction
      - write_discussion
      - assemble_manuscript
      - integrity_check
      - internal_review
      - apply_revision
      - re_review
      - finalize
    skipped_stages: []
    structure:
      sections:
        - title_page
        - abstract
        - introduction
        - methods
        - results
        - discussion
        - ethics_statement
        - data_availability
        - references
        - figures_tables
        - supplementary
      abstract_word_limit: 350
      total_word_limit: 5000
      figure_limit: 6
      table_limit: 4
      reporting_guideline: "STROBE"

  data_resource:
    name: "Data Resource / Database Article"
    pipeline_mode: data_centric
    required_stages:
      - select_topic
      - target_journal
      - literature_search
      - data_audit
      - run_analysis
      - verify_methods
      - write_methods
      - write_results
      - write_introduction
      - write_discussion
      - assemble_manuscript
      - integrity_check
      - internal_review
      - apply_revision
      - re_review
      - finalize
    skipped_stages:
      - formulate_hypotheses
      - figure_planning
    structure:
      sections:
        - title_page
        - abstract
        - introduction
        - data_description
        - methods
        - validation
        - usage_notes
        - data_availability
        - code_availability
        - references
        - supplementary
      abstract_word_limit: 250
      total_word_limit: 4000
      figure_limit: 5
      table_limit: 4

  brief_communication:
    name: "Brief Communication / Short Report"
    pipeline_mode: abbreviated
    required_stages:
      - select_topic
      - target_journal
      - literature_search
      - data_audit
      - run_analysis
      - verify_methods
      - write_methods
      - write_results
      - write_introduction
      - write_discussion
      - assemble_manuscript
      - integrity_check
      - internal_review
      - apply_revision
      - re_review
      - finalize
    skipped_stages:
      - formulate_hypotheses
      - figure_planning
    structure:
      sections:
        - title_page
        - abstract
        - main_text
        - methods
        - references
        - figures
        - supplementary
      abstract_word_limit: 150
      total_word_limit: 2500
      figure_limit: 3
      table_limit: 2

# =============================================================================
# 3. QUALITY GATES (16 gates)
# =============================================================================
quality_gates:

  # --- CRITICAL gates (automatically block submission) ---
  bibtex_citation_existence:
    severity: CRITICAL
    description: "Every BibTeX citation key in the manuscript must exist in references.bib"
    check:
      type: "citation_validation"
      rule: "extract_citation_keys_from_manuscript AND validate_against_bib_file"
    blocking: true
    auto_fix: false

  citation_evidence_traceability:
    severity: CRITICAL
    description: "Every factual claim must be traceable to at least one citation with evidence"
    check:
      type: "claim_evidence_mapping"
      rule: "each_claim_must_have_citation_source AND cross_verify_doi_or_pmid_exists"
    blocking: true
    auto_fix: false

  results_no_citations:
    severity: CRITICAL
    description: "Results section must not contain citations to external literature"
    check:
      type: "section_content_audit"
      rule: "scan_results_section_for_citation_tokens AND flag_all_matches"
    blocking: true
    auto_fix: false

  claim_artifact_binding:
    severity: CRITICAL
    description: "Every numeric result claimed in the paper must be traceable to a specific analysis artifact file"
    check:
      type: "numeric_claim_traceability"
      rule: "extract_numeric_claims AND match_each_to_artifact_output"
    blocking: true
    auto_fix: false

  figures_referenced:
    severity: CRITICAL
    description: "Every figure file in the figures/ directory must be referenced at least once in the manuscript"
    check:
      type: "figure_reference_audit"
      rule: "list_figure_files AND grep_manuscript_for_each_figure_ref"
    blocking: true
    auto_fix: false

  # --- HIGH gates (must be resolved before submission) ---
  data_availability_statement:
    severity: HIGH
    description: "Manuscript must contain a complete Data Availability statement with repository accession numbers"
    check:
      type: "section_presence_audit"
      rule: "find_data_availability_section AND validate_accession_format"
    blocking: true
    auto_fix: true

  code_availability_statement:
    severity: HIGH
    description: "Manuscript must contain a Code Availability statement with repository DOI or URL"
    check:
      type: "section_presence_audit"
      rule: "find_code_availability_section AND validate_repo_doi_format"
    blocking: true
    auto_fix: true

  no_local_paths:
    severity: HIGH
    description: "Manuscript must not contain any local file paths (e.g., C:/Users/..., /home/...)"
    check:
      type: "pattern_scan"
      rule: "scan_for_filesystem_path_patterns AND flag_matches"
    blocking: true
    auto_fix: true

  methods_parameters_complete:
    severity: HIGH
    description: "Methods section must report all software versions, parameter values, and random seeds used"
    check:
      type: "completeness_audit"
      rule: "parse_methods_section AND check_required_fields: [software_versions, parameters, random_seeds, thresholds]"
    blocking: true
    auto_fix: false

  discussion_limitations:
    severity: HIGH
    description: "Discussion section must contain at least one dedicated limitations paragraph"
    check:
      type: "section_content_audit"
      rule: "find_limitations_paragraph_in_discussion"
    blocking: true
    auto_fix: false

  results_no_overinterpretation:
    severity: HIGH
    description: "Results section must not contain causal language for correlational findings or speculative interpretation"
    check:
      type: "language_audit"
      rule: "scan_results_for_causal_claims AND scan_for_overinterpretation_signals"
    blocking: true
    auto_fix: false

  statistics_reported:
    severity: HIGH
    description: "Every statistical test must report test statistic, effect size, confidence interval, and exact p-value"
    check:
      type: "statistical_reporting_audit"
      rule: "parse_statistical_claims AND validate_fields: [test_statistic, effect_size, ci, p_value]"
    blocking: true
    auto_fix: false

  pseudoreplication_check:
    severity: CRITICAL
    description: "Ensure no pseudoreplication: biological vs. technical replicates correctly handled (v3.0 CRITICAL)"
    check:
      type: "experimental_design_audit"
      rule: "identify_replicate_structure AND validate_independence"
    blocking: true
    auto_fix: false

    # =========================================================================
  # v3.0 NEW: Clinical Design Gates (5 CRITICAL)
  # =========================================================================
  study_design_declared:
    severity: CRITICAL
    category: clinical_design
    description: "Study design explicitly declared (cohort/case-control/cross-sectional/diagnostic/RCT/prediction/MR)"
    check:
      type: "design_declaration_audit"
      rule: "scan_for_design_type_in_title_abstract_methods"
    blocking: true
    auto_fix: false

  clinical_question_actionable:
    severity: HIGH
    category: clinical_design
    description: "Research question maps to a specific clinical decision or mechanism gap"
    check:
      type: "clinical_value_audit"
      rule: "validate_against_clinical_value_matrix"
    blocking: true
    auto_fix: false

  inclusion_exclusion_complete:
    severity: CRITICAL
    category: clinical_design
    description: "Inclusion and exclusion criteria fully specified"
    check:
      type: "eligibility_audit"
      rule: "find_inclusion_criteria AND find_exclusion_criteria"
    blocking: true
    auto_fix: false

  endpoint_definition_complete:
    severity: CRITICAL
    category: clinical_design
    description: "Primary and secondary endpoints clearly defined"
    check:
      type: "endpoint_audit"
      rule: "extract_endpoints_from_methods"
    blocking: true
    auto_fix: false

  ethics_irb_or_public_exemption:
    severity: CRITICAL
    category: clinical_design
    description: "IRB/ethics approval or public data exemption documented"
    check:
      type: "ethics_compliance_audit"
      rule: "find_ethics_statement OR find_public_data_exemption"
    blocking: true
    auto_fix: false

  # =========================================================================
  # v3.0 NEW: Data & Bias Gates (3 CRITICAL + 2 HIGH)
  # =========================================================================
  patient_level_independence:
    severity: CRITICAL
    category: data_bias
    description: "Statistical unit is patient/donor, NOT cell/spot/ROI"
    check:
      type: "statistical_unit_audit"
      rule: "compare_n_patients_vs_n_observations"
    blocking: true
    auto_fix: false

  batch_confounding_audit:
    severity: HIGH
    category: data_bias
    description: "Disease group NOT completely confounded with batch/center/platform"
    check:
      type: "batch_confounding_audit"
      rule: "cross_tabulate_condition_by_batch"
    blocking: true
    auto_fix: false

  missing_data_strategy:
    severity: HIGH
    category: data_bias
    description: "Missing data handling strategy explicitly stated"
    check:
      type: "missing_data_audit"
      rule: "find_strategy_in_methods"
    blocking: false
    auto_fix: false

  train_test_leakage_check:
    severity: CRITICAL
    category: data_bias
    description: "No information leakage between training and test/validation sets"
    check:
      type: "data_leakage_audit"
      rule: "verify_split_by_patient_not_observation"
    blocking: true
    auto_fix: false

  sample_overlap_check:
    severity: CRITICAL
    category: data_bias
    description: "No sample overlap between discovery and validation cohorts"
    check:
      type: "sample_overlap_audit"
      rule: "compare_sample_ids_across_cohorts"
    blocking: true
    auto_fix: false

  # =========================================================================
  # v3.0 NEW: Statistics & Model Gates (2 CRITICAL + 3 HIGH)
  # =========================================================================
  statistical_analysis_plan_exists:
    severity: CRITICAL
    category: statistics_model
    description: "Statistical Analysis Plan frozen before primary analysis"
    check:
      type: "sap_audit"
      rule: "find_sap_file AND verify_frozen_status"
    blocking: true
    auto_fix: false

  effect_size_ci_reported:
    severity: HIGH
    category: statistics_model
    description: "Every quantitative claim includes effect size AND confidence interval"
    check:
      type: "effect_size_audit"
      rule: "scan_for_effect_sizes AND scan_for_confidence_intervals"
    blocking: true
    auto_fix: false

  multiple_testing_control:
    severity: CRITICAL
    category: statistics_model
    description: "Multiple testing correction explicitly stated (FDR/Bonferroni/hierarchical)"
    check:
      type: "multiple_testing_audit"
      rule: "find_correction_method AND verify_applied"
    blocking: true
    auto_fix: false

  model_calibration_reported:
    severity: HIGH
    category: statistics_model
    description: "Prediction models report calibration curve and Brier score"
    check:
      type: "calibration_audit"
      rule: "find_calibration_metrics"
    blocking: false
    auto_fix: false

  external_validation_or_limitation:
    severity: CRITICAL
    category: statistics_model
    description: "External validation performed OR conclusion explicitly downgraded"
    check:
      type: "validation_audit"
      rule: "find_external_validation OR find_explicit_limitation"
    blocking: true
    auto_fix: false

  # =========================================================================
  # v3.0 NEW: Single-Cell & Spatial Omics Gates (5 HIGH)
  # =========================================================================
  cell_annotation_evidence:
    severity: HIGH
    category: sc_spatial_omics
    description: "Cell-type annotation supported by >=2 of: markers, reference, manual review"
    check:
      type: "annotation_evidence_audit"
      rule: "count_annotation_evidence_types_min_2_of_3"
    blocking: true
    auto_fix: false

  spatial_region_registration:
    severity: HIGH
    category: sc_spatial_omics
    description: "Spatial regions registered to pathology/imaging reference"
    check:
      type: "spatial_registration_audit"
      rule: "find_registration_method"
    blocking: false
    auto_fix: false

  de_pseudobulk_required:
    severity: HIGH
    category: sc_spatial_omics
    description: "Single-cell DE uses pseudobulk or mixed models, NOT cell-level tests"
    check:
      type: "de_method_audit"
      rule: "identify_de_method AND flag_cell_level_tests"
    blocking: true
    auto_fix: false

  integration_batch_risk:
    severity: HIGH
    category: sc_spatial_omics
    description: "Integration method assessed for removing true biological variation"
    check:
      type: "integration_audit"
      rule: "verify_pre_post_integration_comparison"
    blocking: false
    auto_fix: false

  ligand_receptor_overclaim_check:
    severity: HIGH
    category: sc_spatial_omics
    description: "Cell-cell communication results NOT overclaimed as causal interactions"
    check:
      type: "language_audit"
      rule: "scan_for_causal_language_in_lr_results"
    blocking: false
    auto_fix: false

  # =========================================================================
  # v3.0 NEW: AI/ML Gates (1 CRITICAL + 4 HIGH)
  # =========================================================================
  baseline_model_comparison:
    severity: HIGH
    category: ai_ml
    description: "ML model compared against traditional statistical baseline or clinical score"
    check:
      type: "baseline_audit"
      rule: "find_baseline_comparison"
    blocking: true
    auto_fix: false

  nested_cv_or_external_test:
    severity: CRITICAL
    category: ai_ml
    description: "Nested cross-validation OR independent external test set used"
    check:
      type: "cv_strategy_audit"
      rule: "identify_cv_strategy AND flag_simple_cv_for_small_n"
    blocking: true
    auto_fix: false

  calibration_decision_curve:
    severity: HIGH
    category: ai_ml
    description: "Clinical prediction models report calibration AND decision curve analysis"
    check:
      type: "dca_audit"
      rule: "find_dca_for_clinical_models"
    blocking: false
    auto_fix: false

  explainability_sanity_check:
    severity: HIGH
    category: ai_ml
    description: "SHAP/feature importance NOT interpreted as causal effects"
    check:
      type: "language_audit"
      rule: "scan_for_causal_language_near_shap"
    blocking: false
    auto_fix: false

  deployment_claim_limited:
    severity: HIGH
    category: ai_ml
    description: "No clinical deployment claimed without prospective validation"
    check:
      type: "deployment_audit"
      rule: "scan_for_deployment_claims_without_prospective"
    blocking: true
    auto_fix: false

# --- MEDIUM gates (warn but do not block) ---
  section_length_minimum:
    severity: MEDIUM
    description: "Each required section must meet minimum word count threshold for the target paper type"
    check:
      type: "word_count_audit"
      rule: "count_words_per_section AND compare_to_paper_type_minimums"
    blocking: false
    auto_fix: false

  no_bullets_in_prose:
    severity: MEDIUM
    description: "Manuscript prose (excluding figure captions and tables) must not contain bullet points or numbered lists"
    check:
      type: "formatting_audit"
      rule: "scan_prose_sections_for_bullet_or_list_markers"
    blocking: false
    auto_fix: true

  figure_count_requirements:
    severity: MEDIUM
    description: "Figure and table counts must not exceed journal limits for the target paper type"
    check:
      type: "count_audit"
      rule: "count_figures_and_tables AND compare_to_journal_limits"
    blocking: false
    auto_fix: false

# =============================================================================
# 4. WRITING STANDARDS
# =============================================================================
writing_standards:
  structure: "IMRAD"
  citation_style: "Vancouver"

  sections:
    title:
      min_words: 10
      max_words: 30
      required: true
      description: "Descriptive title conveying the main finding; avoid declarative statements"

    abstract:
      min_words: 200
      max_words: 350
      required: true
      substructure:
        - background
        - methods
        - results
        - conclusions
      description: "Structured abstract with objective quantitative results"

    introduction:
      min_words: 400
      max_words: 1200
      required: true
      description: "Funnel structure: broad context -> knowledge gap -> hypothesis -> specific aims"

    methods:
      min_words: 600
      max_words: 2500
      required: true
      description: "Complete, reproducible detail; subheadings by analysis type"

    results:
      min_words: 500
      max_words: 2000
      required: true
      description: "Objective reporting; no interpretation; past tense; figures cross-referenced"

    discussion:
      min_words: 500
      max_words: 2000
      required: true
      description: "Summarize findings -> compare literature -> limitations -> implications -> future directions"

    acknowledgments:
      min_words: 0
      max_words: 200
      required: false
      description: "Funding sources, grant numbers, contributor thanks"

    references:
      min_count: 20
      max_count: 80
      required: true
      description: "Vancouver numbered style; accuracy verified against PubMed/CrossRef"

  formatting:
    font: "Times New Roman"
    font_size: 12
    line_spacing: 2.0
    margin_inches: 1.0
    file_format: "markdown"
    figure_format: "SVG"
    figure_dpi: 300
    table_style: "three-line"

  language_rules:
    - tense: "past tense for Methods and Results, present tense for established knowledge in Introduction and Discussion"
    - voice: "active voice preferred; first person permitted ('we analyzed')"
    - abbreviations: "define on first use; limit to 10 abbreviations total"
    - numbers: "spell out numbers under 10; use numerals for 10 and above"
    - statistical_reporting: "report exact p-values to 3 decimal places unless < 0.001; always include CI and effect size"
    - gene_names: "human genes in uppercase (TP53); mouse genes title case (Tp53); italics for gene symbols"
    - species: "scientific names in italics on first use with full binomial"
    - units: "SI units; space between number and unit"
    - prohibitions:
        - "no bullet points or numbered lists in prose"
        - "no 'data not shown' statements"
        - "no 'interestingly' or 'surprisingly'"
        - "no 'very', 'highly', 'extremely' without quantification"
        - "no 'first', 'novel', 'pioneering' claims"


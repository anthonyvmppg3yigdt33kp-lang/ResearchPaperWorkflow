research_domains:
  bioinformatics:
    name: "Bioinformatics"
    keywords:
      primary:
        - "bioinformatics"
        - "computational biology"
        - "genomics"
        - "transcriptomics"
        - "proteomics"
      secondary:
        - "machine learning"
        - "network analysis"
        - "pathway enrichment"
        - "differential expression"
        - "multi-omics integration"
    common_methods:
      - "WGCNA"
      - "Gene Set Enrichment Analysis (GSEA)"
      - "Differential Expression (DESeq2/limma/edgeR)"
      - "Machine Learning (Random Forest, SVM, XGBoost, deep learning)"
      - "Network Analysis (STRING, Cytoscape, igraph)"
      - "Pathway Analysis (KEGG, GO, Reactome, WikiPathways)"
      - "Immune Infiltration (CIBERSORT, ESTIMATE, TIMER, xCell)"
      - "Survival Analysis (Kaplan-Meier, Cox regression)"

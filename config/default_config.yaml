# =============================================================================
# 7. AGENT ROUTING (11 agents)
# =============================================================================
agent_routing:
  routing_strategy: best_match_with_fallback
  fallback_agent: team_orchestrator
  agents:
    research_strategist:
      description: "Designs research strategy, formulates hypotheses, selects target journals, and assesses feasibility"
      primary_skills:
        - topic_research
        - deep-research
        - nature-academic-search
      stages:
        - select_topic
        - target_journal
        - formulate_hypotheses

    literature_reviewer:
      description: "Conducts systematic literature searches, manages reference databases, and synthesizes literature reviews"
      primary_skills:
        - deep-research
        - nature-academic-search
        - nature-citation
      stages:
        - literature_search

    data_auditor:
      description: "Audits input data quality, validates formats, checks completeness, and prepares data availability statements"
      primary_skills:
        - nature-data
        - qc_pipeline
      stages:
        - data_audit

    figure_planner:
      description: "Plans figure strategy, designs multi-panel layouts, and ensures visual storytelling aligns with paper narrative"
      primary_skills:
        - figure_planning
        - nature-figure
      stages:
        - figure_planning

    analysis_executor:
      description: "Executes computational analyses including spatial analysis, statistical testing, and pathway inference"
      primary_skills:
        - spatial_analysis
        - statistical_testing
        - pathway_inference
        - qc_pipeline
      stages:
        - run_analysis

    pipeline_engineer:
      description: "Maintains analysis pipelines, ensures reproducibility, manages dependencies, and handles environment setup"
      primary_skills:
        - qc_pipeline
        - spatial_analysis
      stages:
        - run_analysis
        - verify_methods

    report_writer:
      description: "Writes and polishes all manuscript sections, applies scientific writing standards, and manages citations"
      primary_skills:
        - scientific-writing
        - nature-writing
        - nature-polishing
        - humanizer
        - nature-citation
        - nature-response
      stages:
        - write_methods
        - write_results
        - write_introduction
        - write_discussion
        - assemble_manuscript
        - apply_revision

    statistician:
      description: "Validates statistical methods, checks assumptions, ensures proper reporting of statistical results"
      primary_skills:
        - statistical_testing
      stages:
        - verify_methods

    integrity_checker:
      description: "Runs quality gates, verifies claim-evidence binding, ensures reproducibility, and conducts internal review"
      primary_skills:
        - qc_pipeline
        - academic-paper-reviewer
        - nature-data
        - nature-citation
      stages:
        - verify_methods
        - integrity_check
        - internal_review
        - re_review

    team_orchestrator:
      description: "Coordinates multi-agent workflows, manages dependencies between stages, and handles pipeline supervision"
      primary_skills:
        - deep-research
      stages:
        - finalize

    code_librarian:
      description: "Manages code library, tracks analysis scripts, handles plugin registration, and maintains code documentation"
      primary_skills:
        - qc_pipeline
      stages:
        - run_analysis
        - verify_methods
        - finalize

    multi_omics_integrator:
      description: "Integrates multi-omics data modalities (transcriptomics, proteomics, metabolomics, epigenomics) using advanced computational frameworks for cross-platform normalization, joint dimensionality reduction, multi-view clustering, and biological network inference across heterogeneous high-dimensional datasets"
      primary_skills:
        - multi_omics
        - spatial_analysis
        - pathway_inference
      stages:
        - run_analysis
        - verify_methods

supervision:
  timeout:
    global_timeout_seconds: 86400
    stage_default_timeout_seconds: 3600
    max_pipeline_duration_seconds: 172800
    timeout_action: "graceful_abort_with_checkpoint"
    checkpoint_interval_seconds: 300

  retry:
    strategy: "exponential_backoff"
    exponential_backoff:
      base_seconds: 60
      multiplier: 2.0
      max_delay_seconds: 900
      jitter: true
      jitter_factor: 0.1
    max_cumulative_retries: 20
    retryable_errors:
      - "timeout"
      - "transient_network"
      - "api_rate_limit"
      - "resource_unavailable"
    non_retryable_errors:
      - "invalid_parameter"
      - "missing_dependency"
      - "data_corruption"
      - "permission_denied"

  circuit_breaker:
    enabled: true
    failure_threshold: 5
    recovery_timeout_seconds: 600
    half_open_max_attempts: 2
    tracked_scopes:
      - "per_stage"
      - "per_agent"
      - "per_skill"
    on_open:
      action: "skip_stage"
      notification: "circuit_breaker_triggered"

  logging:
    level: "INFO"
    format: "structured_json"
    destinations:
      - type: "file"
        path: "logs/pipeline.log"
        rotation: "daily"
        retention_days: 30
      - type: "console"
        level: "WARNING"
    fields:
      - "timestamp"
      - "stage_id"
      - "agent_id"
      - "event_type"
      - "duration_ms"
      - "status"
      - "artifacts"
      - "error_message"
    redact:
      - "api_key"
      - "password"
      - "token"
      - "secret"

# =============================================================================
# 9. CODE LIBRARY
# =============================================================================
code_library:
  auto_discover:
    enabled: true
    on_startup: true
    on_stage_enter: true

  scan_paths:
    - "code_library/patterns/qc/"
    - "code_library/patterns/clustering/"
    - "code_library/modules/"
    - "code_library/solutions/"
    - "code_library/snippets/"
    - "code_library/r/"
    - "code_library/pipelines/"

  plugin_registry:
    enabled: true
    registry_file: "code_library/plugin_registry.yaml"
    auto_register_new_scripts: true
    supported_languages:
      - name: "R"
        extension: ".R"
        runner: "Rscript"
        version_command: "Rscript --version"
        min_version: "4.0.0"
        package_manager: "renv"
        lock_file: "renv.lock"
        environment_file: "environment.yml"
      - name: "Python"
        extension: ".py"
        runner: "python"
        version_command: "python --version"
        min_version: "3.9.0"
        package_manager: "pip"
        lock_file: "requirements.txt"
        environment_file: "environment.yml"
      - name: "Shell"
        extension: ".sh"
        runner: "bash"
        version_command: "bash --version"
        min_version: "5.0.0"
      - name: "Jupyter"
        extension: ".ipynb"
        runner: "jupyter nbconvert --to notebook --execute"
        version_command: "jupyter --version"
        min_version: "6.0.0"

# =============================================================================
# 10. OUTPUT INTERFACES
# =============================================================================
output_interfaces:

  stage_result:
    description: "Schema for stage execution results"
    schema:
      type: "object"
      required:
        - stage_id
        - status
        - started_at
        - completed_at
        - artifacts
        - quality_gate_results
      properties:
        stage_id:
          type: "string"
          description: "Unique stage identifier"
        status:
          type: "string"
          enum:
            - "passed"
            - "failed"
            - "skipped"
            - "timed_out"
            - "circuit_broken"
        started_at:
          type: "string"
          format: "date-time"
        completed_at:
          type: "string"
          format: "date-time"
        duration_seconds:
          type: "number"
        agent:
          type: "string"
          description: "Agent that executed this stage"
        attempts:
          type: "integer"
          minimum: 1
        artifacts:
          type: "array"
          items:
            type: "object"
            properties:
              path:
                type: "string"
              type:
                type: "string"
                enum:
                  - "markdown"
                  - "yaml"
                  - "json"
                  - "pdf"
                  - "bib"
                  - "svg"
                  - "png"
                  - "tiff"
                  - "zip"
                  - "csv"
                  - "tsv"
              size_bytes:
                type: "integer"
              checksum:
                type: "string"
        quality_gate_results:
          type: "array"
          items:
            type: "object"
            properties:
              gate_id:
                type: "string"
              passed:
                type: "boolean"
              severity:
                type: "string"
                enum:
                  - "CRITICAL"
                  - "HIGH"
                  - "MEDIUM"
              message:
                type: "string"
        errors:
          type: "array"
          items:
            type: "object"
            properties:
              code:
                type: "string"
              message:
                type: "string"
              recoverable:
                type: "boolean"
        human_decision:
          type: "object"
          properties:
            approved:
              type: "boolean"
            comment:
              type: "string"
            timestamp:
              type: "string"
              format: "date-time"

  integrity_report:
    description: "Schema for the integrity check report"
    schema:
      type: "object"
      required:
        - pipeline_run_id
        - generated_at
        - overall_status
        - gate_results
        - claim_verification
      properties:
        pipeline_run_id:
          type: "string"
          format: "uuid"
        generated_at:
          type: "string"
          format: "date-time"
        overall_status:
          type: "string"
          enum:
            - "pass"
            - "pass_with_warnings"
            - "fail"
        gate_results:
          type: "object"
          description: "Map of gate_id to result"
          additionalProperties:
            type: "object"
            properties:
              passed:
                type: "boolean"
              severity:
                type: "string"
              details:
                type: "string"
              violations:
                type: "array"
                items:
                  type: "object"
                  properties:
                    location:
                      type: "string"
                    description:
                      type: "string"
                    fix_suggestion:
                      type: "string"
        claim_verification:
          type: "object"
          properties:
            total_claims:
              type: "integer"
            verified_claims:
              type: "integer"
            unverifiable_claims:
              type: "integer"
            missing_citations:
              type: "integer"
            unverifiable_details:
              type: "array"
              items:
                type: "object"
                properties:
                  claim_text:
                    type: "string"
                  section:
                    type: "string"
                  reason:
                    type: "string"
        figure_audit:
          type: "object"
          properties:
            figures_on_disk:
              type: "integer"
            figures_referenced:
              type: "integer"
            orphan_figures:
              type: "array"
              items:
                type: "string"
            unreferenced_figures:
              type: "array"
              items:
                type: "string"
        statistics_audit:
          type: "object"
          properties:
            total_reported_tests:
              type: "integer"
            complete_reporting:
              type: "integer"
            incomplete_reporting:
              type: "array"
              items:
                type: "object"
                properties:
                  test_description:
                    type: "string"
                  missing_fields:
                    type: "array"
                    items:
                      type: "string"

  workflow_report:
    description: "Schema for the final workflow execution report"
    schema:
      type: "object"
      required:
        - pipeline_run_id
        - paper_type
        - started_at
        - completed_at
        - stages_summary
        - final_status
        - artifacts_delivered
      properties:
        pipeline_run_id:
          type: "string"
          format: "uuid"
        paper_type:
          type: "string"
        target_journal:
          type: "string"
        started_at:
          type: "string"
          format: "date-time"
        completed_at:
          type: "string"
          format: "date-time"
        total_duration_seconds:
          type: "number"
        final_status:
          type: "string"
          enum:
            - "completed"
            - "completed_with_issues"
            - "aborted"
            - "failed"
        stages_summary:
          type: "array"
          items:
            type: "object"
            properties:
              stage_id:
                type: "string"
              status:
                type: "string"
              duration_seconds:
                type: "number"
              attempts:
                type: "integer"
              artifacts_count:
                type: "integer"
        artifacts_delivered:
          type: "array"
          items:
            type: "object"
            properties:
              path:
                type: "string"
              description:
                type: "string"
              checksum:
                type: "string"
        quality_summary:
          type: "object"
          properties:
            critical_gates_passed:
              type: "integer"
            critical_gates_total:
              type: "integer"
            high_gates_passed:
              type: "integer"
            high_gates_total:
              type: "integer"
            medium_gates_passed:
              type: "integer"
            medium_gates_total:
              type: "integer"
        reproducibility_score:
          type: "number"
          minimum: 0
          maximum: 100
        human_review_points:
          type: "array"
          items:
            type: "object"
            properties:
              stage:
                type: "string"
              decision:
                type: "string"
              timestamp:
                type: "string"

# =============================================================================
# 11. REPRODUCIBILITY
# =============================================================================
reproducibility:
  random_seeds:
    default_seed: 42
    enforce_global: true
    per_component:
      r_analyses: 42
      python_analyses: 42
      machine_learning:
        data_split_seed: 42
        model_init_seed: 42
        hyperparameter_search_seed: 42
    seed_logging: true
    seed_verification: "on_stage_enter"

  environment_tracking:
    enabled: true
    capture_on_stage_start: true
    capture_items:
      - system_info:
          - "OS name and version"
          - "CPU architecture"
          - "total RAM"
      - software_versions:
          - "R version + loaded packages"
          - "Python version + pip freeze"
          - "System dependencies"
      - git_info:
          - "commit hash"
          - "branch name"
          - "dirty status"
      - container_info:
          - "Docker image digest"
          - "Singularity image path"
    output_format: "environment_snapshot.yaml"
    compare_across_runs: true
    alert_on_difference: true

# =============================================================================
# 12. EXTENSION POINTS
# =============================================================================
extension_points:

  custom_analysis_scripts:
    enabled: true
    description: "User-provided analysis scripts that integrate into the pipeline"
    scan_patterns:
      - extension: ".py"
        scan_dirs:
          - "scripts/custom/"
          - "extensions/python/"
        registration:
          auto_detect: true
          require_manifest: false
      - extension: ".R"
        scan_dirs:
          - "scripts/custom/"
          - "extensions/R/"
        registration:
          auto_detect: true
          require_manifest: false
      - extension: ".sh"
        scan_dirs:
          - "scripts/custom/"
          - "extensions/shell/"
        registration:
          auto_detect: true
          require_manifest: false
    validation:
      check_syntax: true
      check_imports: true
      dry_run_available: true
    execution:
      sandbox: true
      timeout_seconds: 3600
      resource_limits:
        max_memory_mb: 16384
        max_cpu_cores: 8

  custom_agents:
    enabled: true
    description: "User-defined agents that extend the default 11-agent roster"
    registration:
      method: "yaml_manifest"
      manifest_path: "config/custom_agents.yaml"
    capabilities:
      - can_own_stages: true
      - can_use_skills: true
      - can_access_artifacts: true
    constraints:
      - must_declare_primary_skills
      - must_declare_stages
      - must_follow_supervision_rules

  custom_skills:
    enabled: true
    description: "User-defined skills that extend the skill dispatcher"
    registration:
      method: "yaml_manifest"
      manifest_path: "config/custom_skills.yaml"
    capabilities:
      - can_be_dispatched: true
      - can_define_triggers: true
      - can_define_phase: true
    constraints:
      - must_declare_triggers
      - must_declare_phase
      - must_declare_agent
      - must_validate_before_registration
    validation:
      dry_run_on_register: true
      conflict_detection: true
